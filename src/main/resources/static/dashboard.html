<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: white;
      padding: 40px;
    }

    h1 { margin-bottom: 30px; }

    .action-row {
      display: flex;
      gap: 12px;
      margin-bottom: 30px;
    }

    .action-row button {
      background: #2563eb;
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 999px;
      cursor: pointer;
    }

    .grid {
      display: flex;
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      flex: 1;
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    .value {
      font-size: 28px;
      margin-top: 10px;
    }

    select {
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #1e293b;
      color: white;
      width: 250px;
      margin-bottom: 20px;
    }

    .filters button {
      margin-right: 10px;
      padding: 6px 12px;
      border-radius: 20px;
      border: none;
      background: #334155;
      color: white;
      cursor: pointer;
    }

    .member-list {
      list-style: none;
      padding: 0;
      margin: 8px 0 20px;
      display: grid;
      gap: 8px;
      max-width: 420px;
    }

    .member-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: rgba(255,255,255,0.04);
      border-radius: 8px;
      padding: 8px 10px;
    }

    .remove-btn {
      background: #ef4444;
      border: none;
      border-radius: 14px;
      padding: 4px 10px;
      color: white;
      cursor: pointer;
      transition: background-color 0.2s ease;
      font-size: 12px;
    }

    .remove-btn:hover {
      background: #dc2626;
    }

    .task-list {
      list-style: none;
      padding: 0;
      display: grid;
      gap: 12px;
    }

    .task-list li {
      background: rgba(255,255,255,0.05);
      padding: 14px;
      border-radius: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .done-btn {
      background: #22c55e;
      border: none;
      border-radius: 20px;
      padding: 6px 14px;
      color: white;
      cursor: pointer;
      transition: background-color 0.2s ease;
    }

    .done-btn:hover {
      background: #16a34a;
    }

    .completed {
      opacity: 0.5;
      text-decoration: line-through;
    }

    .assignee {
      color: #94a3b8;
      font-size: 12px;
      margin-top: 4px;
      display: inline-block;
    }
  </style>
</head>

<body>

<h1>Dashboard</h1>

<div class="action-row">
  <button onclick="createTask()">+ New Task</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="grid">
  <div class="card">Total<div class="value" id="total"></div></div>
  <div class="card">Completed<div class="value" id="completed"></div></div>
  <div class="card">Pending<div class="value" id="pending"></div></div>
  <div class="card">Overdue<div class="value" id="overdue"></div></div>
</div>

<h2>Tasks</h2>

<div style="margin-top:20px;">
  <div class="filters">
    <button onclick="showActive()">Active</button>
    <button onclick="showCompleted()">Completed</button>
  </div>

  <ul id="taskList" class="task-list"></ul>
</div>

<div style="margin-top:30px;">
  <h3>Project Members <button onclick="openMemberModal()" style="margin-left:10px; padding:6px 12px; border:none; border-radius:20px; background:#2563eb; color:white; font-size:14px; cursor:pointer;">+ Add Member</button></h3>
  <div id="membersList"></div>
</div>

<script>
let allTasks = [];

async function loadDashboard() {
  try {
    const res = await fetch("/dashboard", {
      headers: { Authorization: "Bearer " + localStorage.getItem("token") }
    });

    if (!res.ok) throw new Error("Failed to load dashboard");

    const data = await res.json();
    const stats = data.data || {};

    document.getElementById("total").innerText = stats.totalTasks ?? 0;
    document.getElementById("completed").innerText = stats.completedTasks ?? 0;
    document.getElementById("pending").innerText = stats.pendingTasks ?? 0;
    document.getElementById("overdue").innerText = stats.overdueTasks ?? 0;
  } catch (error) {
    console.error("Dashboard load error:", error);
  }
}

function loadTasks() {
  allTasks = JSON.parse(localStorage.getItem("tasks") || "[]");
  render(allTasks);
  updateStats(allTasks);
}

function loadMembers() {
  const members = JSON.parse(localStorage.getItem("members") || "[]");

  const container = document.getElementById("membersList");
  container.innerHTML = "";

  members.forEach(m => {
    const div = document.createElement("div");
    div.innerHTML = `
      <b>${m.name}</b><br>
      <small>${m.email}</small>
    `;
    container.appendChild(div);
  });
}

function showActive() {
  render(allTasks.filter(t => t.status !== "DONE"));
}

function showCompleted() {
  render(allTasks.filter(t => t.status === "DONE"));
}

function render(tasks) {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  if (tasks.length === 0) {
    list.innerHTML = "<p style='text-align:center; opacity:0.6;'>No tasks</p>";
    return;
  }

  tasks.forEach(t => {
    const originalIndex = allTasks.findIndex(task => 
      task.title === t.title && task.assignedTo === t.assignedTo
    );
    const li = document.createElement("li");

    li.innerHTML = `
      <div>
        <b>${t.title}</b><br>
        <small>${t.description || ""}</small><br>
        <span class="assignee">Assigned to: ${t.assignedTo}</span>
      </div>
      ${t.status !== "DONE"
        ? `<button class="done-btn" onclick="markDone(${originalIndex})">Done</button>`
        : ""}
    `;

    if (t.status === "DONE") li.classList.add("completed");

    list.appendChild(li);
  });
}

function updateStats(tasks) {
  const total = tasks.length;
  const completed = tasks.filter(t => t.status === "DONE").length;
  const pending = tasks.filter(t => t.status !== "DONE").length;

  document.getElementById("total").innerText = total;
  document.getElementById("completed").innerText = completed;
  document.getElementById("pending").innerText = pending;
  document.getElementById("overdue").innerText = 0;
}

function markDone(index) {
  const tasks = JSON.parse(localStorage.getItem("tasks") || "[]");

  tasks[index].status = "DONE";

  localStorage.setItem("tasks", JSON.stringify(tasks));

  loadTasks();
}

async function createTask() {
  // Populate the select with members
  const members = JSON.parse(localStorage.getItem("members") || "[]");
  const select = document.getElementById("assignUser");
  select.innerHTML = "";

  members.forEach(m => {
    const opt = document.createElement("option");
    opt.value = m.name + " (" + m.email + ")";
    opt.textContent = m.name;
    select.appendChild(opt);
  });

  openTaskModal();
}

function submitTask() {
  const title = document.getElementById("taskTitle").value;
  const description = document.getElementById("taskDescription").value;
  const assignedTo = document.getElementById("assignUser").value;

  if (!title) {
    alert("Enter title");
    return;
  }

  if (!assignedTo) {
    alert("Select member");
    return;
  }

  const tasks = JSON.parse(localStorage.getItem("tasks") || "[]");

  tasks.push({
    title,
    description,
    assignedTo,
    status: "ACTIVE"
  });

  localStorage.setItem("tasks", JSON.stringify(tasks));

  alert("Task created");

  closeTaskModal();
  loadTasks();
}

function openTaskModal() {
  document.getElementById("taskModal").style.display = "flex";
}

function closeTaskModal() {
  document.getElementById("taskModal").style.display = "none";
  document.getElementById("taskTitle").value = "";
  document.getElementById("taskDescription").value = "";
}



function logout() {
  localStorage.clear();
  window.location.href = "/login.html";
}

async function init() {
  const role = localStorage.getItem("role");
  
  if (role !== "ADMIN") {
    const newTaskBtn = document.querySelector('[onclick="createTask()"]');
    if (newTaskBtn) {
      newTaskBtn.style.display = "none";
    }
  }
  
  await loadTasks();
  await loadDashboard();
  loadMembers();
}

init();

function openMemberModal() {
  document.getElementById("memberModal").style.display = "flex";
}

function closeMemberModal() {
  document.getElementById("memberModal").style.display = "none";
}

async function createProject() {
  const name = prompt("Project name:");
  if (!name) return;

  const description = prompt("Description:");

  const res = await fetch("/projects", {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + localStorage.getItem("token"),
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ name, description })
  });

  if (!res.ok) {
    alert("Error creating project");
    return;
  }

  alert("Project created");
  await loadTasks();
  loadMembers();
}

function submitMember() {
  const email = document.getElementById("memberEmail").value;
  const role = document.getElementById("memberRole").value;

  if (!email) {
    alert("Enter email");
    return;
  }

  const members = JSON.parse(localStorage.getItem("members") || "[]");

  members.push({
    name: email.split("@")[0],
    email: email,
    role: role
  });

  localStorage.setItem("members", JSON.stringify(members));

  alert("Member added");

  document.getElementById("memberEmail").value = "";
  closeMemberModal();
  loadMembers();
}
</script>
<div id="memberModal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
">

  <div style="
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    width:300px;
  ">
    <h3>Add Member</h3>

    <input id="memberEmail" placeholder="Email" style="width:100%; padding:8px; margin-bottom:10px;" />

    <select id="memberRole" style="width:100%; padding:8px; margin-bottom:10px;">
      <option value="MEMBER">Member</option>
      <option value="ADMIN">Admin</option>
    </select>

    <button onclick="submitMember()">Add</button>
    <button onclick="closeMemberModal()">Cancel</button>
  </div>
</div>

<div id="taskModal" style="
  display:none;
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background:rgba(0,0,0,0.6);
  justify-content:center;
  align-items:center;
">

  <div style="
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    width:300px;
  ">
    <h3>Create Task</h3>

    <input id="taskTitle" placeholder="Title" style="width:100%; padding:8px; margin-bottom:10px;" />

    <textarea id="taskDescription" placeholder="Description" style="width:100%; padding:8px; margin-bottom:10px; height:60px;"></textarea>

    <select id="assignUser" style="width:100%; padding:8px; margin-bottom:10px;">
    </select>

    <button onclick="submitTask()">Create</button>
    <button onclick="closeTaskModal()">Cancel</button>
  </div>
</div>

</body>
</html>
